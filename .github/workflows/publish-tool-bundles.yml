name: Publish Tool Bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/agent-studio/cli/scripts/build-tool-registry.ts"
      - "apps/agent-studio/core/src/tool-manifests.ts"
      - "apps/agent-studio/core/src/tool-registry.ts"
      - "packages/tools/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build tool bundles and registry
        run: >
          bun run build:tools --
          --registry-path tool-registry.json
          --asset-base-url https://github.com/${{ github.repository }}/releases/download/tool-bundles

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tool-bundles
          name: Tool Bundles
          files: |
            .dist/tool-bundles/*.zip
            tool-registry.json
          overwrite_files: true
